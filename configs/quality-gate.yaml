# SDKWork Settings 质量门配置
# Authority: ../sdkwork-specs/QUALITY_GATE_SPEC.md

application:
  code: settings
  version: 0.1.0

definitionOfReady:
  - spec: 需求有明确的 PRD 和验收标准
  - design: 架构决策记录在 ADR 中
  - dependencies: 依赖的框架可用且版本对齐
  - environment: 开发环境可运行

definitionOfDone:
  - code: 代码遵循 sdkwork-specs 标准
  - tests: 单元测试 + 集成测试通过
  - api: API 契约遵循 SdkWorkApiResponse 信封
  - database: 数据库契约与 baseline 对齐
  - security: 认证授权通过 sdkwork-iam 集成
  - observability: 日志、metrics、tracing 就绪
  - docs: 文档更新,无历史残留
  - framework: web-framework/database/utils/iam/drive 框架接入

mergeGates:
  - command: cargo check --workspace
    required: true
  - command: cargo clippy --workspace -- -D warnings
    required: true
  - command: cargo test --workspace
    required: true
  - command: cargo fmt --all -- --check
    required: true

releaseGates:
  - command: pnpm check:pnpm-script-standard
    required: true
  - command: pnpm check:agent-workflow-standard
    required: true
  - command: pnpm check:api-envelope
    required: true
  - command: pnpm check:database-initialization
    required: true
  - command: cargo test --workspace
    required: true
  - command: cargo clippy --workspace -- -D warnings
    required: true

commercialReadiness:
  - performance: 配置查询 P99 < 200ms
  - security: 租户隔离 + 全量审计
  - reliability: 数据库不可用时降级到缓存
  - observability: 全链路 traceId
  - deploy: standalone + cloud profile 就绪
  - docs: PRD + TECH_ARCHITECTURE + ADR 完整
