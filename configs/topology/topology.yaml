# SDKWork Settings topology configuration
# Authority: ../sdkwork-specs/APP_RUNTIME_TOPOLOGY_SPEC.md

application:
  code: settings
  deploymentProfiles:
    - standalone
    - cloud
  publicIngress:
    surface: application.public-ingress
    binary: sdkwork-settings-standalone-gateway
    port: 8080

profiles:
  standalone:
    services:
      - name: application.public-ingress
        kind: http
        plane: application
        port: 8080
        binary: sdkwork-settings-standalone-gateway
        routes:
          - prefix: /settings/v1/app-api
            surface: app-api
          - prefix: /settings/v1/backend-api
            surface: backend-api
          - prefix: /healthz
            surface: infra
          - prefix: /readyz
            surface: infra
          - prefix: /livez
            surface: infra
          - prefix: /metrics
            surface: infra

  cloud:
    services:
      - name: application.public-ingress
        kind: http
        plane: application
        port: 8080
        binary: sdkwork-settings-standalone-gateway
        routes:
          - prefix: /settings/v1/app-api
            surface: app-api
          - prefix: /settings/v1/backend-api
            surface: backend-api
          - prefix: /healthz
            surface: infra
          - prefix: /readyz
            surface: infra
          - prefix: /livez
            surface: infra
          - prefix: /metrics
            surface: infra
      - name: platform.api-gateway
        kind: http
        plane: platform
        port: 3900
        binary: sdkwork-api-cloud-gateway
        required: false

database:
  defaultEngine: postgres
  supportedEngines:
    - postgres
    - sqlite

discovery:
  mode: static
