# SDKWork Settings deployment manifest
# Authority: ../sdkwork-specs/SDKWORK_DEPLOY_SPEC.md, ../sdkwork-specs/DEPLOYMENT_SPEC.md

application:
  code: settings
  name: SDKWork Settings
  version: 0.1.0

profiles:
  standalone:
    description: Self-contained Settings deployment with one application public ingress.
    processes:
      - name: application.public-ingress
        binary: sdkwork-api-settings-standalone-gateway
        port: 8080
        env:
          SDKWORK_SETTINGS_DEPLOYMENT_PROFILE: standalone
          SDKWORK_SETTINGS_ENVIRONMENT: production
          SDKWORK_SETTINGS_PROFILE_ID: standalone.production
          SDKWORK_SETTINGS_APPLICATION_PUBLIC_INGRESS_BIND: 0.0.0.0:8080
          SDKWORK_SETTINGS_APPLICATION_PUBLIC_HTTP_URL: http://127.0.0.1:8080
          SETTINGS_DATABASE_URL: ${SETTINGS_DATABASE_URL}
    database:
      engine: sqlite
      url: sqlite://data/settings.db?mode=rwc
    browser:
      target: apps/sdkwork-settings-pc
      devServer: http://localhost:5173
      apiProxy: http://localhost:8080

  cloud:
    description: Cloud Settings deployment with one application public ingress and optional platform API gateway config bundle.
    processes:
      - name: application.public-ingress
        binary: sdkwork-api-settings-standalone-gateway
        port: 8080
        env:
          SDKWORK_SETTINGS_DEPLOYMENT_PROFILE: cloud
          SDKWORK_SETTINGS_ENVIRONMENT: production
          SDKWORK_SETTINGS_PROFILE_ID: cloud.production
          SDKWORK_SETTINGS_APPLICATION_PUBLIC_INGRESS_BIND: 0.0.0.0:8080
          SDKWORK_SETTINGS_APPLICATION_PUBLIC_HTTP_URL: https://settings.sdkwork.com
          SDKWORK_SETTINGS_PLATFORM_API_GATEWAY_HTTP_URL: https://api.sdkwork.com
          SETTINGS_DATABASE_URL: ${SETTINGS_DATABASE_URL}
      - name: platform.api-gateway
        binary: sdkwork-api-cloud-gateway
        port: 3900
        required: false
        config: configs/sdkwork-api-cloud-gateway.settings.production.toml
        env:
          SDKWORK_API_CLOUD_GATEWAY_BIND: 0.0.0.0:3900
          SDKWORK_API_CLOUD_GATEWAY_CONFIG: configs/sdkwork-api-cloud-gateway.settings.production.toml
    database:
      engine: postgres
      url: ${SETTINGS_DATABASE_URL}
    browser:
      target: apps/sdkwork-settings-pc
      cdn: https://cdn.sdkwork.com/apps/settings/releases/latest/web-universal-cloud-browser.zip

install:
  defaultPackageId: web-universal-cloud-browser-zip
  packages:
    - id: web-universal-cloud-browser-zip
      name: SDKWork Settings Web Bundle
      sourceType: WEB_URL
      packageFormat: ZIP
      platform: WEB
      architecture: universal
      deploymentProfile: cloud
      deviceClass: BROWSER
    - id: web-universal-standalone-browser-zip
      name: SDKWork Settings Standalone Web Bundle
      sourceType: DIRECT_DOWNLOAD
      packageFormat: ZIP
      platform: WEB
      architecture: universal
      deploymentProfile: standalone
      deviceClass: BROWSER

adaptive:
  web:
    enabled: true
    inference:
      api: true
      websocket: true
